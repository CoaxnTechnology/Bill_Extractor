services:
  - type: web
    name: bill-extracter-backend
    runtime: image
    repo: https://github.com/YOUR_USER/YOUR_REPO
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bill-extracter-db
          property: connectionString

databases:
  - type: postgres
    name: bill-extracter-db
    plan: starter
    databaseName: bills_db
    user: bills_user
    ipAllowList: []
